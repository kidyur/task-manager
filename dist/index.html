<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Работа не Волк | Календарь смен, управление задачами</title>
  <script type="module" crossorigin src="/assets/index-B1XJ1o8C.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DmvvuWa2.css">
</head>

<body>    
    <div id="tasks-page" class="page">
        <div id="tasks-page__tag-line">
            <button class="tasks-page__tag">#без_тега</button>
            <button class="tasks-page__tag">#повтор</button>
            <button class="tasks-page__tag">#события</button>
        </div>
        <div id="tasks-page__add-task-button" class="button">
            Добавить задачу
        </div>
        <div>
            <input type="date" id="tasks-page__date-input"></input>
        </div>
        <input id="tasks-page__task-name-input"></input>
        <div id="tasks-page__task-list">
        </div>
    </div>
    
    <div id="calendar-page" class="page">
        <div id="calendar-page__month-picker-btn">
            <div id="calendar-page__title"></div>
        </div>
        <div id="month-picker">
            <div id="month-picker__header">
                <button class="month-picker__btn"></button>
                <div id="month-picker__year"></div>
                <button class="month-picker__btn"></button>
            </div>
        </div>
        <div id="calendar"></div>
    </div>
    <div id="schedule-page" class="page">
        <div id="schedule-page__groups-line">
            <div id="schedule-page__groups-sector"></div>
            <button id="schedule-page__add-schedule-btn" class="schedule-page__add-schedule-btn">+</button>
        </div>
        <div id="schedule-page__shift-list"></div>
        <div style="width: 100%; display: flex; justify-content: flex-end; flex-direction: column;">
            <button id="schedule-page__add-shift-btn">+ Добавить день</button> 
            <button id="schedule-page__setup-schedule-day-btn">Установить день начала расписания</button> 
            <button id="schedule-page__delete-schedule-btn">Удалить расписание</button>
        </div>

        <div id="icons-window">
        </div>
    </div>

    <footer>
        <button id="open-schedule-page-btn" class="footer__btn">
            <div>Расписание</div>
        </button>
        <button id="open-calendar-page-btn" class="footer__btn">
            <div>Календарь</div>
        </button>
        <button id="open-tasks-page-btn" class="footer__btn">
            <div>Задачи</div>
        </button>
    </footer>

    <script src="scripts/footerButtons.js"></script>
    <script src="scripts/tasks.js"></script>
    
</body>
</html>
