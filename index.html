<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Календарь | Календарь смен, управление задачами</title>
</head>

<body>    
    <div id="tasks-page" class="page">
        <button id="tasks-page__filter-btn">
            Фильтр
        </button>
        <div id="tasks-page__tag-line">            
        </div>        
        <div style="height: 20px"></div>     
        <button id="tasks-page__add-task-btn">
            Добавить задачу 
        </button>
        <input id="tasks-page__tag-input" class="tasks-page__input" autocomplete="off" maxlength="15"></input>
        <div id="tasks-page__task-list">
        </div>
        <div>
            <input type="date" id="tasks-page__date-input"></input>
        </div>
        <input id="tasks-page__task-name-input" class="tasks-page__input"></input>                
        <div style="height: 20px"></div>        
        <div id="tasks-page__add-tag-button" class="button">
            Добавить тэг
        </div>
        <input id="tasks-page__tag-input" class="tasks-page__input"></input>
        <div id="tasks-page__task-list">
        </div>
    </div>
    
    <div id="calendar-page" class="page">
        <div id="calendar-page__month-picker-btn">
            <div id="calendar-page__title"></div>
            <div id="month-picker__header">
                <button class="month-picker__btn"></button>
                <div id="month-picker__year"></div>
                <button class="month-picker__btn"></button>
            </div>
        </div>
        <div id="month-picker">
        </div>
        <div id="calendar"></div>
    </div>
    <div id="schedule-page" class="page">
        <div id="schedule-page__groups-line">
            <div id="schedule-page__groups-sector"></div>
            <button id="schedule-page__add-schedule-btn" class="schedule-page__add-schedule-btn">+</button>
        </div>
        <div id="schedule-page__shift-list"></div>
        <div id="schedule-page__manager">
            <button id="schedule-page__add-shift-btn">+ Добавить день</button> 
            <button id="schedule-page__delete-schedule-btn">Удалить расписание</button>
        </div>

        <div id="schedule-page__hint">
            <div id="long-arrow"></div>
            <div id="lightbulb"></div>
            <p>Создайте своё первое <br> расписание</p>
        </div>
    </div>

    <script type="module" src="/src/scripts/tasks/taskList.mjs"></script>
    <script type="module" src="/src/scripts/tasks/tag.mjs"></script>
    <script type="module" src="/src/scripts/tasks/task.mjs"></script>
    <script type="module" src="/src/scripts/tasks/taskDate.mjs"></script>
    
    <script type="module" src="/src/scripts/calendar.mjs"></script>
    <script type="module" src="/src/scripts/schedule.mjs"></script>
    <script type="module" src="/src/scripts/schedulesData.mjs"></script>
    <script type="module" src="/src/scripts/dateData.mjs"></script>
    <script type="module" src="/src/scripts/day.mjs"></script>
    <script type="module" src="/src/renderer.js"></script>
</body>
</html>
