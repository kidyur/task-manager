<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь2 | Календарь смен, управление задачами</title>
</head>

<body>    
    <div id="tasks-page" class="page">
    <div id="tasks-page__tag-line">            
    </div>        
    <div id="tag-manager">
        <button id="tasks-page__add-tag-button" class="default-btn">
            Добавить тег
        </button>
        <button id="tasks-page__filter-btn">
            Фильтр
        </button>
    </div>     
    <input placeholder="Введите название тега" id="tasks-page__tag-input" class="tasks-page__input" autocomplete="off" maxlength="15"></input>
    <div style="height: 20px"></div>     
    <button id="tasks-page__add-task-btn" class="default-btn">
        Добавить задачу 
    </button> 
    <input placeholder="Введите название задачи" id="tasks-page__task-name-input" class="tasks-page__input" autocomplete="off" maxlength=60></input>                
    <div style="height: 20px"></div>   
    <div id="tasks-page__task-list">
    </div>
    </div>
    <div class="calendar-page page">
        <div id="calendar-page__month-picker-btn">
            <div id="calendar-page__title"></div>
            <div id="month-picker__header">
                <button class="month-picker__btn"></button>
                <div id="month-picker__year"></div>
                <button class="month-picker__btn"></button>
            </div>
        </div>
        <div id="month-picker"></div>
    </div>
    <div id="schedule-page" class="page">

    </div>

    <script type="module" src="/src/renderer.js"></script>
</body>
</html>
