<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/calendar_page.css">
    <link rel="stylesheet" href="styles/tasks_page.css">
    <link rel="stylesheet" href="styles/schedule_page.css">
    <link rel="stylesheet" href="styles/common.css">
    <title>Работа не Волк | Календарь смен, управление задачами</title>
</head>

<body>    
    <div id="tasks-page" class="page">
        <button id="tasks-page__filter-btn">
            Ф
        </button>
        <div id="tasks-page__tag-line">            
        </div>        
        <div style="height: 20px"></div>     
        <button id="tasks-page__add-task-btn">
            Добавить задачу 
        </button>
        <div>
            <input type="date" id="tasks-page__date-input"></input>
        </div>
        <input id="tasks-page__task-name-input" class="tasks-page__input"></input>                
        <div style="height: 20px"></div>        
        <div id="tasks-page__add-tag-button" class="button">
            Добавить тэг
        </div>
        <input id="tasks-page__tag-input" class="tasks-page__input"></input>
        <div id="tasks-page__task-list">
        </div>
    </div>
    
    <div id="calendar-page" class="page">
        <div id="calendar-page__month-picker-btn">
            <p id="calendar-page__year"></p>
            <button id="calendar-page__month"></button>
        </div>
        <div id="month-picker"></div>
        <div id="calendar"></div>
    </div>
    <div id="schedule-page" class="page">
        <div id="schedule-page__groups-line">
            <div id="schedule-page__groups-sector"></div>
            <button id="schedule-page__add-schedule-btn" class="schedule-page__add-schedule-btn">+</button>
        </div>
        <div id="schedule-page__shift-list"></div>
        <div style="width: 100%; display: flex; justify-content: flex-end;">
            <button id="schedule-page__add-shift-btn">+ Добавить день</button> 
        </div>

        <div id="icons-window">
        </div>
    </div>

    <footer>
        <button id="open-schedule-page-btn" class="footer__btn">
            <div>Расписание</div>
        </button>
        <button id="open-calendar-page-btn" class="footer__btn">
            <div>Календарь</div>
        </button>
        <button id="open-tasks-page-btn" class="footer__btn">
            <div>Задачи</div>
        </button>
    </footer>

    <script src="scripts/footer_buttons.js"></script>
    <script src="scripts/calendar.js"></script>
    <script src="scripts/schedule.js"></script>
    <script src="scripts/tasks.js"></script>
</body>
</html>
